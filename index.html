<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм Братів</title>
    <style>
        :root {
            --primary-color: #5d4037; /* Колір кабіту */
            --bg-color: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--primary-color); }

        #search-container {
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        #search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary-color);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        #brothers-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .brother-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .brother-card:hover {
            transform: translateY(-5px);
        }

        .brother-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background-color: #e0e0e0;
        }

        .info {
            padding: 15px;
            text-align: center;
        }

        .info h3 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.4em;
        }

        .real-name {
            font-style: italic;
            color: #757575;
            margin: 5px 0 10px 0;
            font-size: 0.9em;
        }

        .details {
            border-top: 1px solid #eee;
            padding-top: 10px;
            font-size: 0.9em;
            text-align: left;
            color: #444;
        }

        .details p { margin: 5px 0; }

        .loading { font-size: 1.2em; color: var(--primary-color); }
    </style>
</head>
<body>

    <h1>Схематизм Провінції</h1>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Пошук за прізвищем або ім'ям...">
    </div>

    <div id="brothers-container">
        <div class="loading">Завантаження даних...</div>
    </div>

    <script>
        // ЗАМІНІТЬ ЦЕЙ ID НА ВАШ
        const sheetId = 'ВАШ_ID_ТАБЛИЦІ'; 
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        let brothersData = [];

        async function init() {
            try {
                const response = await fetch(base);
                const text = await response.text();
                // Парсимо CSV (враховуючи лапки)
                brothersData = text.split('\n').slice(1).map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return columns.map(col => col.replace(/^"|"$/g, ''));
                });
                displayBrothers(brothersData);
            } catch (error) {
                document.getElementById('brothers-container').innerHTML = 'Помилка завантаження даних.';
                console.error(error);
            }
        }

        function displayBrothers(data) {
            const container = document.getElementById('brothers-container');
            container.innerHTML = '';

            data.forEach(row => {
                // Відповідно до вашого скріншоту:
                // row[0] - fotolink (GitHub)
                // row[3] - Прізвище
                // row[4] - Законне ім'я
                // row[5] - Хресне ім'я
                // row[6] - Дата народження
                // row[7] - Місце народження

                if (!row[3]) return; // Пропускати порожні рядки

                const card = document.createElement('div');
                card.className = 'brother-card';
                
                card.innerHTML = `
                    <img src="${row[0]}" alt="${row[3]}" onerror="this.src='https://via.placeholder.com/300x400?text=Немає+фото'">
                    <div class="info">
                        <h3>${row[4]} ${row[3]}</h3>
                        <p class="real-name">(${row[5]})</p>
                        <div class="details">
                            <p><strong>Народився:</strong> ${row[6]}</p>
                            <p><strong>Місце:</strong> ${row[7]}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Пошук
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = brothersData.filter(row => 
                (row[3] + row[4] + row[5]).toLowerCase().includes(searchTerm)
            );
            displayBrothers(filtered);
        });

        init();
    </script>
</body>
</html>
