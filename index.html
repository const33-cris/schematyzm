<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм</title>
    <style>
        :root {
            --primary: #5d4037;
            --accent: #1877f2;
            --text-main: #1c1e21;
            --text-secondary: #606770;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text-main);
        }
        
        .header { width: 100%; max-width: 600px; padding: 20px 15px 10px; text-align: center; }
        h1 { margin: 0 0 15px 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        #searchInput { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; 
            font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); outline: none; box-sizing: border-box;
        }

        #searchSuggestions {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none; z-index: 1000;
        }
        .suggestion-item { padding: 12px 20px; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f2f5; }

        #catalog { width: 100%; max-width: 600px; padding: 10px; box-sizing: border-box; }
        
        .card { 
            background: white; 
            border-radius: 28px; 
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        /* Верхня частина: Фото зліва, Текст справа */
        .card-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .photo-circle { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 4px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            background: #eee;
            flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .name-box { 
            display: flex; 
            flex-direction: column; 
            text-align: left;
        }

        .legal-name { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.1; }
        .surname-main { font-size: 1.4rem; font-weight: 600; color: var(--text-main); margin: 5px 0 0 0; }

        /* Навігація ПО ЦЕНТРУ */
        .controls { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 20px; 
            margin: 20px 0;
            width: 100%;
        }
        button { 
            padding: 10px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; 
            border: none; background-color: var(--primary); color: white; font-weight: bold;
            min-width: 100px; transition: opacity 0.2s;
        }
        button:disabled { background-color: #dcdcdc; color: #999; cursor: not-allowed; }
        #counter { font-weight: 700; color: var(--text-secondary); font-size: 1rem; min-width: 60px; text-align: center; }

        .details-grid { 
            width: 100%;
            display: grid; 
            gap: 15px; 
            padding-top: 20px; 
            border-top: 1px solid #f0f2f5;
        }
        .detail-row { display: flex; flex-direction: column; gap: 3px; text-align: left;}
        .detail-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; letter-spacing: 0.5px; }
        .detail-value { font-size: 1.1rem; font-weight: 500; color: var(--text-main); }

        /* Адаптація для мобільних екранів */
        @media (max-width: 480px) {
            .card-header { flex-direction: column; text-align: center; gap: 15px; }
            .name-box { text-align: center; }
            .photo-circle { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>СХЕМАТИЗМ ПРОВІНЦІЇ СВ. АРХАНГЕЛА МИХАЇЛА</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Пошук..." oninput="handleSearch()" autocomplete="off">
            <div id="searchSuggestions"></div>
        </div>
    </div>

    <div id="catalog"></div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzYu1iQBGrymGA_nYR1rU3j6quWdGvkHtBrNxQeA7r_2p1v6U06TZNPdBynkB9KHxrk/exec';
        let allItems = [];
        let filteredItems = [];
        let idx = 0;

        function formatDateUk(dateStr) {
            if (!dateStr || dateStr.length < 5) return '—';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            const months = ["січня", "лютого", "березня", "квітня", "травня", "червня", "липня", "серпня", "вересня", "жовтня", "листопада", "грудня"];
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        async function load() {
            try {
                const r = await fetch(scriptUrl);
                const d = await r.json();
                allItems = d.filter(row => row[3] && row[3].toString().trim() !== "");
                filteredItems = [...allItems];
                render();
            } catch (e) { document.getElementById('catalog').innerHTML = "Помилка завантаження."; }
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const suggestions = document.getElementById('searchSuggestions');
            if (term.length < 1) {
                suggestions.style.display = 'none';
                filteredItems = [...allItems];
                idx = 0;
                render();
                return;
            }
            const matches = allItems.filter(item => 
                item[3].toString().toLowerCase().includes(term) || 
                item[4].toString().toLowerCase().includes(term)
            );
            if (matches.length > 0) {
                suggestions.innerHTML = matches.map(item => `
                    <div class="suggestion-item" onclick="selectPerson('${item[3]}')">
                        <strong>${item[4]}</strong> ${item[3]}
                    </div>
                `).join('');
                suggestions.style.display = 'block';
            } else { suggestions.style.display = 'none'; }
            filteredItems = matches;
            idx = 0;
            render();
        }

        function selectPerson(surname) {
            document.getElementById('searchInput').value = surname;
            document.getElementById('searchSuggestions').style.display = 'none';
            filteredItems = allItems.filter(item => item[3] === surname);
            idx = 0;
            render();
        }

        function render() {
            const catalog = document.getElementById('catalog');
            if (filteredItems.length === 0) {
                catalog.innerHTML = "<p style='text-align:center'>Нікого не знайдено</p>";
                return;
            }
            const p = filteredItems[idx];

            catalog.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="photo-circle">
                            <img src="${p[0]}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/200?text=Фото'">
                        </div>
                        <div class="name-box">
                            <h2 class="legal-name">${p[4] || '—'}</h2>
                            <div class="surname-main">${p[3] || '—'}</div>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="prevBtn" onclick="change(-1)" ${idx === 0 ? 'disabled' : ''}>←</button>
                        <span id="counter">${idx + 1} / ${filteredItems.length}</span>
                        <button id="nextBtn" onclick="change(1)" ${idx === filteredItems.length - 1 ? 'disabled' : ''}>→</button>
                    </div>
                    
                    <div class="details-grid">
                        <div class="detail-row">
                            <div class="detail-label">Ім'я з Хрещення</div>
                            <div class="detail-value">${p[5] || '—'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">День народження</div>
                            <div class="detail-value">${formatDateUk(p[6])}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Місце народження</div>
                            <div class="detail-value">${p[7] || '—'}</div>
                        </div>
                    </div>
                </div>`;
        }

        function change(d) { 
            idx += d; 
            render(); 
        }
        
        load();
    </script>
</body>
</html>
