<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм Провінції</title>

    <meta name="apple-mobile-web-app-title" content="Схематизм">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ВІДНОСНИЙ_ШЛЯХ_ДО_ВАШОЇ_ІКОНКИ/icon.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="https://raw.githubusercontent.com/ВІДНОСНИЙ_ШЛЯХ_ДО_ВАШОЇ_ІКОНКИ/icon.png?v=2">

    <style>
        :root {
            --primary: #5d4037;
            --text-main: #1c1e21;
            --text-secondary: #606770;
            --bg: #f0f2f5;
            --accent-blue: #003366;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; color: var(--text-main);
        }
        
        .header { width: 100%; max-width: 600px; padding: 25px 15px 5px; text-align: center; box-sizing: border-box; }
        
        .title-main { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; }
        .title-sub { font-size: 0.9rem; font-weight: 400; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; }
        
        .search-container { position: relative; width: 100%; margin-bottom: 10px; }
        #searchInput { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; 
            font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); outline: none; box-sizing: border-box;
        }

        .view-toggle {
            margin: 5px 0 15px 0;
            padding: 8px 20px;
            font-weight: 700;
            color: var(--accent-blue);
            background-color: transparent;
            border: 2px solid var(--primary);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            display: none; 
            transition: all 0.3s ease;
        }

        #searchSuggestions {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none; z-index: 1000;
        }

        .suggestion-item { padding: 12px 20px; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f2f5; }
        .suggestion-item.active { background-color: #e8e1df; border-left: 5px solid var(--primary); font-weight: bold; }

        #catalog { width: 100%; max-width: 600px; padding: 0 5px 20px; box-sizing: border-box; }
        
        /* КАРТКА */
        .card { 
            background: white; border-radius: 28px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box;
        }
        .card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .photo-circle { 
            width: 140px; height: 140px; border-radius: 50%; overflow: hidden; 
            border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            background: #eee; flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .name-box { display: flex; flex-direction: column; text-align: left; }
        .legal-name { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.1; }
        .surname-main { font-size: 1.4rem; font-weight: 500; color: var(--text-main); margin: 5px 0 0 0; }

        .experience-box { margin: 12px 0; display: flex; flex-direction: column; gap: 4px; font-size: 1.1rem; font-weight: 800; color: var(--accent-blue); text-align: center; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; width: 100%; }
        button.nav-btn { padding: 8px 20px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background-color: var(--primary); color: white; font-weight: bold; }
        button.nav-btn:disabled { background-color: #dcdcdc; color: #999; }

        .details-grid { width: 100%; display: grid; gap: 12px; padding-top: 15px; border-top: 1px solid #f0f2f5; }
        .detail-row { display: flex; flex-direction: column; text-align: left;}
        .detail-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; }
        .detail-value { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }

        /* СІТКА - ТЕЛЕФОН (ЗБІЛЬШЕНО) */
        .brothers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 5px;
            width: 100%;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 5px 0;
        }
        .grid-photo {
            width: 95px; /* Збільшено для телефону */
            height: 95px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #eee;
            margin-bottom: 6px;
        }
        .grid-photo img { width: 100%; height: 100%; object-fit: cover; }
        .grid-name { font-weight: 700; font-size: 0.8rem; color: var(--primary); text-align: center; line-height: 1.2; }

        /* ВЕРСІЯ ДЛЯ КОМП'ЮТЕРА (ЗБІЛЬШЕНО) */
        @media (min-width: 768px) {
            #catalog { max-width: 900px; }
            .grid-photo { width: 155px; height: 155px; border-width: 5px; }
            .grid-name { font-size: 1.15rem; margin-top: 8px; }
            .brothers-grid { gap: 35px; padding: 20px; }
        }

        @media (max-width: 400px) {
            .grid-photo { width: 85px; height: 85px; } /* Трохи менше для зовсім вузьких екранів */
            .grid-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-main">СХЕМАТИЗМ ПРОВІНЦІЇ</div>
        <div class="title-sub">СВ. АРХАНГЕЛА МИХАЇЛА</div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Пошук..." oninput="handleSearch()" autocomplete="off">
            <div id="searchSuggestions"></div>
        </div>

        <button id="toggleLink" class="view-toggle" onclick="toggleView()">Усі брати</button>
    </div>

    <div id="catalog">
        <div style="padding: 50px; color: #999; text-align: center;">Завантаження...</div>
    </div>

    <script>
        const scriptUrl = 'ВАШ_SCRIPT_URL_ТУТ';
        
        let allItems = [];
        let idx = 0;
        let isGridView = true; 

        async function load() {
            try {
                const r = await fetch(scriptUrl);
                allItems = await r.json();
                render();
            } catch (e) { 
                document.getElementById('catalog').innerHTML = "<div style='color:red; text-align:center;'>Помилка зв'язку.</div>"; 
            }
        }

        function toggleView() {
            isGridView = !isGridView;
            render();
        }

        function selectFromGrid(index) {
            idx = index;
            isGridView = false;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function render() {
            const catalog = document.getElementById('catalog');
            const toggleBtn = document.getElementById('toggleLink');
            if (allItems.length === 0) return;

            if (isGridView) {
                toggleBtn.style.display = "none";
                renderGrid(catalog);
            } else {
                toggleBtn.style.display = "inline-block";
                toggleBtn.innerText = "Усі брати";
                renderCard(catalog);
            }
        }

        function renderGrid(container) {
            container.innerHTML = `
                <div class="brothers-grid">
                    ${allItems.map((p, i) => `
                        <div class="grid-item" onclick="selectFromGrid(${i})">
                            <div class="grid-photo">
                                <img src="${p[0]}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/100?text=?'">
                            </div>
                            <div class="grid-name">бр. ${p[4]}</div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderCard(container) {
            const p = allItems[idx];
            const monkExp = calculateExperience(p[10]);
            const priestExp = calculateExperience(p[13]);

            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="photo-circle">
                            <img src="${p[0]}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/200?text=фото'">
                        </div>
                        <div class="name-box">
                            <h2 class="legal-name">бр. ${p[4] || '—'}</h2>
                            <div class="surname-main">${p[3] || '—'}</div>
                        </div>
                    </div>
                    <div class="experience-box">
                        ${monkExp ? `<div>${monkExp} чернечого життя</div>` : ''}
                        ${priestExp ? `<div>${priestExp} священства</div>` : ''}
                    </div>
                    <div class="controls">
                        <button class="nav-btn" onclick="change(-1)" ${idx === 0 ? 'disabled' : ''}>←</button>
                        <span style="font-weight:700;">${idx + 1} / ${allItems.length}</span>
                        <button class="nav-btn" onclick="change(1)" ${idx === allItems.length - 1 ? 'disabled' : ''}>→</button>
                    </div>
                    <div class="details-grid">
                        ${createDetail("Ім'я з Хрещення", p[5], false)}
                        ${createDetail("Іменини", p[7], false)}
                        ${createDetail("День народження", p[6])}
                        ${createDetail("Місце народження", p[8], false)}
                        ${createDetail("Новіціат", p[9])}
                        ${createDetail("Перші обіти", p[10])}
                        ${createDetail("Вічні обіти", p[11])}
                        ${createDetail("Дияконат", p[12])}
                        ${createDetail("Священство", p[13])}
                    </div>
                </div>`;
        }

        function calculateExperience(dateStr) {
            if (!dateStr || dateStr === "-" || dateStr === "—" || dateStr.trim() === "") return null;
            let s = dateStr.trim().split('T')[0];
            let parts = s.includes('.') ? s.split('.') : s.split('-');
            let dateObj = parts[0].length === 4 ? new Date(parts[0], parts[1]-1, parts[2]) : new Date(parts[2], parts[1]-1, parts[0]);
            if (isNaN(dateObj.getTime())) return null;
            let today = new Date();
            let years = today.getFullYear() - dateObj.getFullYear();
            if (today.getMonth() < dateObj.getMonth() || (today.getMonth() === dateObj.getMonth() && today.getDate() < dateObj.getDate())) years--;
            if (years < 0) return null;
            let suffix = "років";
            if (years % 10 === 1 && years % 100 !== 11) suffix = "рік";
            else if (years % 10 >= 2 && years % 10 <= 4 && (years % 100 < 10 || years % 100 >= 20)) suffix = "роки";
            return years + " " + suffix;
        }

        function formatDateUk(dateInput) {
            if (!dateInput || dateInput.toString().trim() === "" || dateInput === "-") return null;
            const months = ["січня", "лютого", "березня", "квітня", "травня", "червня", "липня", "серпня", "вересня", "жовтня", "листопада", "грудня"];
            let s = dateInput.toString().trim().split('T')[0];
            let parts = s.includes('.') ? s.split('.') : s.split('-');
            if (parts.length < 3) return dateInput;
            let d, m, y;
            if (parts[0].length === 4) { y = parts[0]; m = parseInt(parts[1])-1; d = parseInt(parts[2]); }
            else { d = parseInt(parts[0]); m = parseInt(parts[1])-1; y = parts[2]; }
            return (m >= 0 && m <= 11) ? d + " " + months[m] + " " + y : dateInput;
        }

        function createDetail(label, value, isDate = true) {
            let displayValue = isDate ? formatDateUk(value) : value;
            if (!displayValue || displayValue === "—" || displayValue === "-" || displayValue.toString().trim() === "") return "";
            return `<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value">${displayValue}</div></div>`;
        }

        function change(d) { idx += d; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const suggestions = document.getElementById('searchSuggestions');
            if (term.length < 1) { suggestions.style.display = 'none'; return; }
            const matches = allItems.filter(item => (item[3]?.toLowerCase().includes(term)) || (item[4]?.toLowerCase().includes(term)));
            if (matches.length > 0) {
                suggestions.innerHTML = matches.map((item, i) => `<div class="suggestion-item ${i===0?'active':''}" onclick="selectPerson('${item[3]}', '${item[4]}')"><strong>бр. ${item[4]}</strong> ${item[3]}</div>`).join('');
                suggestions.style.display = 'block';
            } else { suggestions.style.display = 'none'; }
        }

        function selectPerson(surname, firstName) {
            document.getElementById('searchInput').value = "";
            document.getElementById('searchSuggestions').style.display = 'none';
            const personIdx = allItems.findIndex(item => item[3] === surname && item[4] === firstName);
            if (personIdx !== -1) { idx = personIdx; isGridView = false; render(); }
        }

        load();
    </script>
</body>
</html>
