<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм Провінції</title>
    <style>
        :root {
            --primary: #5d4037;
            --accent: #1877f2;
            --text-main: #1c1e21;
            --text-secondary: #606770;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text-main);
        }
        
        /* Заголовок */
        .header { width: 100%; max-width: 600px; padding: 25px 15px 10px; text-align: center; box-sizing: border-box; }
        
        h1 { 
            margin: 0 0 15px 0; 
            color: var(--primary); 
            line-height: 1.3; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .title-main {
            font-size: 1.2rem;
            font-weight: 800;
            display: block;
            margin-bottom: 2px;
        }

        .title-sub {
            font-size: 0.9rem;
            font-weight: 400;
            display: block;
        }
        
        /* Пошук */
        .search-container { 
            position: relative; 
            width: 100%; 
            margin-bottom: 10px;
        }

        #searchInput { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; 
            font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); outline: none; box-sizing: border-box;
        }

        #searchSuggestions {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none; z-index: 1000;
        }
        .suggestion-item { padding: 12px 20px; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f2f5; }

        /* Контейнер картки */
        #catalog { 
            width: 100%; 
            max-width: 600px; 
            padding: 0 10px 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }
        
        .card { 
            background: white; 
            border-radius: 28px; 
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 5px;
        }

        /* Велике коло фото */
        .photo-circle { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 5px solid white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            background: #eee;
            flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .name-box { display: flex; flex-direction: column; text-align: left; }
        .legal-name { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.1; }
        .surname-main { font-size: 1.6rem; font-weight: 500; color: var(--text-main); margin: 5px 0 0 0; }

        /* Кнопки навігації */
        .controls { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 20px; 
            margin: 20px 0;
            width: 100%;
        }
        button { 
            padding: 10px 30px; font-size: 1.3rem; cursor: pointer; border-radius: 50px; 
            border: none; background-color: var(--primary); color: white; font-weight: bold;
            min-width: 90px;
        }
        button:disabled { background-color: #dcdcdc; color: #999; cursor: not-allowed; }
        #counter { font-weight: 700; color: var(--text-secondary); font-size: 1.1rem; min-width: 80px; text-align: center; }

        /* Сітка даних */
        .details-grid { 
            width: 100%;
            display: grid; 
            gap: 15px; 
            padding-top: 20px; 
            border-top: 1px solid #f0f2f5;
        }
        .detail-row { display: flex; flex-direction: column; gap: 4px; text-align: left;}
        .detail-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.5px; }
        
        /* Напівжирні значення даних */
        .detail-value { font-size: 1.15rem; font-weight: 700; color: var(--text-main); }

        /* Адаптація для мобільних */
        @media (max-width: 480px) {
            .header { padding: 15px 10px 5px; }
            #catalog { padding: 0 15px 10px; }
            .card { padding: 25px 20px; }
            .card-header { flex-direction: column; text-align: center; gap: 15px; }
            .name-box { text-align: center; }
            .photo-circle { width: 175px; height: 175px; } 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <span class="title-main">СХЕМАТИЗМ ПРОВІНЦІЇ</span>
            <span class="title-sub">СВ. АРХАНГЕЛА МИХАЇЛА</span>
        </h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Пошук..." oninput="handleSearch()" autocomplete="off">
            <div id="searchSuggestions"></div>
        </div>
    </div>

    <div id="catalog"></div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzYu1iQBGrymGA_nYR1rU3j6quWdGvkHtBrNxQeA7r_2p1v6U06TZNPdBynkB9KHxrk/exec';
        let allItems = [];

        function formatDateUk(dateInput) {
            if (!dateInput || dateInput.toString().trim() === "" || dateInput.toString() === "-") return null;
            const date = new Date(dateInput);
            if (isNaN(date.getTime())) return dateInput; 
            const months = ["січня", "лютого", "березня", "квітня", "травня", "червня", "липня", "серпня", "вересня", "жовтня", "листопада", "грудня"];
            return date.getDate() + " " + months[date.getMonth()] + " " + date.getFullYear();
        }

        // Завантаження даних
        async function load() {
            try {
                const r = await fetch(scriptUrl);
                const d = await r.json();
                allItems = d.filter(row => row[3] && row[3].toString().trim() !== "");
                render();
            } catch (e) { 
                document.getElementById('catalog').innerHTML = "Помилка завантаження даних."; 
            }
        }
