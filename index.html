<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм Провінції</title>
    <style>
        :root {
            --primary: #5d4037;
            --accent: #1877f2;
            --text-main: #1c1e21;
            --text-secondary: #606770;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text-main);
        }
        
        .header { width: 100%; max-width: 600px; padding: 20px 15px 10px; text-align: center; }
        h1 { margin: 0 0 15px 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        #searchInput { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; 
            font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); outline: none; box-sizing: border-box;
        }

        #searchSuggestions {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none; z-index: 1000;
        }
        .suggestion-item { padding: 12px 20px; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f2f5; font-size: 1rem; }
        .suggestion-item:hover { background-color: #f0f7ff; color: var(--accent); }

        #catalog { width: 100%; max-width: 600px; padding: 10px; box-sizing: border-box; }
        
        .card { 
            background: white; 
            border-radius: 28px; 
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 10px;
        }

        .photo-circle { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 4px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            background: #eee;
            flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .name-box { display: flex; flex-direction: column; text-align: left; }
        .legal-name { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.1; }
        .surname-main { font-size: 1.6rem; font-weight: 600; color: var(--text-main); margin: 5px 0 0 0; }

        .controls { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 20px; 
            margin: 25px 0;
            width: 100%;
        }
        button { 
            padding: 10px 30px; font-size: 1.3rem; cursor: pointer; border-radius: 50px; 
            border: none; background-color: var(--primary); color: white; font-weight: bold;
            min-width: 90px; transition: opacity 0.2s;
        }
        button:disabled { background-color: #dcdcdc; color: #999; cursor: not-allowed; }
        #counter { font-weight: 700; color: var(--text-secondary); font-size: 1.1rem; min-width: 80px; text-align: center; }

        .details-grid { 
            width: 100%;
            display: grid; 
            gap: 18px; 
            padding-top: 25px; 
            border-top: 1px solid #f0f2f5;
        }
        .detail-row { display: flex; flex-direction: column; gap: 4px; text-align: left;}
