<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; max-width: 500px; padding: 25px 15px; box-sizing: border-box; text-align: center; position: relative; z-index: 100; }
        h1 { margin: 0 0 20px 0; color: #2c3e50; font-weight: 600; text-transform: uppercase; font-size: 1.1rem; line-height: 1.4; letter-spacing: 0.5px; }
        
        /* Пошук та випадаючий список */
        .search-container { position: relative; width: 100%; }
        #searchInput { 
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; 
            font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); outline: none; box-sizing: border-box;
        }

        #searchSuggestions {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none;
            border: 1px solid #eee;
        }
        .suggestion-item {
            padding: 12px 20px; text-align: left; cursor: pointer;
            border-bottom: 1px solid #f9f9f9; font-size: 0.95rem;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: #f0f7ff; color: #1877f2; }

        /* Картка */
        #catalog { width: 100%; max-width: 450px; padding: 10px; box-sizing: border-box; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd; display: flex; flex-direction: column; min-height: 550px; }
        .photo-box { width: 100%; height: 350px; background: #e9ecef; overflow: hidden; }
        .photo { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .info { padding: 25px; flex-grow: 1; }
        .surname { font-size: 1.8rem; font-weight: bold; margin: 0; color: #1c1e21; }
        .legal { color: #1877f2; font-style: italic; margin-bottom: 15px; font-size: 1.2rem; }
        
        .details { font-size: 0.95rem; color: #4b4f56; }
        .details p { margin: 8px 0; display: flex; border-bottom: 1px solid #f2f3f5; padding-bottom: 4px; justify-content: space-between; }
        .details b { color: #8d949e; font-size: 0.75rem; text-transform: uppercase; padding-top: 4px; }
        .value { color: #1c1e21; font-weight: 500; text-align: right; margin-left: 10px; }

        /* Навігація */
        .controls { display: flex; align-items: center; gap: 20px; margin: 10px 0 40px; }
        button { padding: 12px 25px; font-size: 1rem; cursor: pointer; border-radius: 50px; border: none; background-color: #1877f2; color: white; font-weight: bold; }
        button:disabled { background-color: #e4e6eb; color: #bcc0c4; cursor: not-allowed; }
        #counter { font-weight: bold; color: #606770; min-width: 80px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Схематизм Провінції св. Архангела Михаїла</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Пошук прізвища..." oninput="handleSearch()" autocomplete="off">
            <div id="searchSuggestions"></div>
        </div>
    </div>

    <div id="catalog"></div>

    <div class="controls">
        <button id="prevBtn" onclick="change(-1)">← Назад</button>
        <span id="counter">0 / 0</span>
        <button id="nextBtn" onclick="change(1)">Вперед →</button>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzYu1iQBGrymGA_nYR1rU3j6quWdGvkHtBrNxQeA7r_2p1v6U06TZNPdBynkB9KHxrk/exec';
        let allItems = [];
        let filteredItems = [];
        let idx = 0;

        async function load() {
            try {
                const r = await fetch(scriptUrl);
                const d = await r.json();
                allItems = d.filter(row => row[1] && row[1].toString().trim() !== "");
                filteredItems = [...allItems];
                render();
            } catch (e) { document.getElementById('catalog').innerHTML = "Помилка завантаження."; }
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const suggestions = document.getElementById('searchSuggestions');
            
            if (term.length < 1) {
                suggestions.style.display = 'none';
                filteredItems = [...allItems];
                render();
                return;
            }

            // Знаходимо збіги для списку
            const matches = allItems.filter(item => 
                item[1].toString().toLowerCase().includes(term)
            );

            if (matches.length > 0) {
                suggestions.innerHTML = matches.map((item, i) => `
                    <div class="suggestion-item" onclick="selectPerson('${item[1]}')">
                        <strong>${item[1]}</strong> ${item[3] || ''}
                    </div>
                `).join('');
                suggestions.style.display = 'block';
            } else {
                suggestions.style.display = 'none';
            }
            
            // Також фільтруємо основні картки
            filteredItems = matches;
            idx = 0;
            render();
        }

        function selectPerson(surname) {
            document.getElementById('searchInput').value = surname;
            document.getElementById('searchSuggestions').style.display = 'none';
            filteredItems = allItems.filter(item => item[1] === surname);
            idx = 0;
            render();
        }

        // Закриття списку при кліку поза ним
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                document.getElementById('searchSuggestions').style.display = 'none';
            }
        });

        function render() {
            const catalog = document.getElementById('catalog');
            const counter = document.getElementById('counter');
            
            if (filteredItems.length === 0) {
                catalog.innerHTML = "<p style='text-align:center; padding: 20px;'>Нікого не знайдено</p>";
                counter.innerText = "0 / 0";
                return;
            }

            const p = filteredItems[idx];
            const formatD = (s) => {
                if (!s || s.length < 5) return '—';
                let date = new Date(s);
                return isNaN(date) ? s : date.toLocaleDateString('uk-UA');
            };

            catalog.innerHTML = `
                <div class="card">
                    <div class="photo-box">
                        <img src="${p[0]}" class="photo" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/450x350?text=Немає+фото'">
                    </div>
                    <div class="info">
                        <p class="surname">${p[1]}</p>
                        <div class="legal">${p[2] || ''}</div>
                        <div class="details">
                            <p><b>Ім'я</b> <span class="value">${p[3] || '—'}</span></p>
                            <p><b>Народження</b> <span class="value">${formatD(p[4])}</span></p>
                            <p><b>Місце</b> <span class="value">${p[5] || '—'}</span></p>
                        </div>
                    </div>
                </div>`;
            
            counter.innerText = `${idx + 1} / ${filteredItems.length}`;
            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === filteredItems.length - 1;
        }

        function change(d) {
            idx += d;
            render();
            window.scrollTo(0,0);
        }

        load();
    </script>
</body>
</html>
