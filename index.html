<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схематизм Провінції</title>
    <style>
        :root {
            --primary: #5d4037;
            --text-main: #1c1e21;
            --text-secondary: #606770;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; color: var(--text-main);
        }
        
        /* ВЕЛИКИЙ ЖИРНИЙ ЗАГОЛОВОК */
        .header { width: 100%; max-width: 600px; padding: 30px 15px 10px; text-align: center; box-sizing: border-box; }
        
        .title-main {
            font-size: 1.6rem !important;
            font-weight: 800 !important;
            color: var(--primary);
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .title-sub {
            font-size: 1rem !important;
            font-weight: 400;
            color: var(--primary);
            display: block;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        .search-container { position: relative; width: 100%; margin-bottom: 15px; }

        #searchInput { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; 
            font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); outline: none; box-sizing: border-box;
        }

        #searchSuggestions {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none; z-index: 1000;
        }
        .suggestion-item { padding: 12px 20px; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f2f5; }
        
.suggestion-item.active {
    background-color: #e8e1df; /* Світло-коричневий відтінок під стиль */
    border-left: 5px solid var(--primary);
    font-weight: bold;
}
        #catalog { width: 100%; max-width: 600px; padding: 0 10px 20px; box-sizing: border-box; display: flex; justify-content: center; }
        
        .card { 
            background: white; border-radius: 28px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box;
        }

        .card-header { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }

        .photo-circle { 
            width: 170px; height: 170px; border-radius: 50%; overflow: hidden; 
            border: 5px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            background: #eee; flex-shrink: 0;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .name-box { display: flex; flex-direction: column; text-align: left; }
        .legal-name { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.1; }
        .surname-main { font-size: 1.6rem; font-weight: 500; color: var(--text-main); margin: 5px 0 0 0; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; width: 100%; }
        button { 
            padding: 10px 25px; font-size: 1.3rem; cursor: pointer; border-radius: 50px; 
            border: none; background-color: var(--primary); color: white; font-weight: bold; min-width: 80px;
        }
        button:disabled { background-color: #dcdcdc; color: #999; cursor: not-allowed; }
        #counter { font-weight: 700; color: var(--text-secondary); font-size: 1.1rem; }

        .details-grid { width: 100%; display: grid; gap: 15px; padding-top: 20px; border-top: 1px solid #f0f2f5; }
        .detail-row { display: flex; flex-direction: column; gap: 2px; text-align: left;}
        .detail-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.5px; }
        .detail-value { font-size: 1.15rem; font-weight: 700; color: var(--text-main); }

        @media (max-width: 480px) {
            .card-header { flex-direction: column; text-align: center; gap: 15px; }
            .name-box { text-align: center; }
            .photo-circle { width: 180px; height: 180px; } 
        }
      .experience-box {
    margin: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    /* Трохи більший шрифт, жирний та темно-синій */
    font-size: 1.15rem; 
    font-weight: 800;
    color: #003366; /* Глибокий темно-синій */
    text-align: center;
    line-height: 1.2;
}
    </style>
</head>
<body>

    <div class="header">
        <div class="title-main">СХЕМАТИЗМ ПРОВІНЦІЇ</div>
        <div class="title-sub">СВ. АРХАНГЕЛА МИХАЇЛА</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Пошук..." oninput="handleSearch()" autocomplete="off">
            <div id="searchSuggestions"></div>
        </div>
    </div>

    <div id="catalog">
        <div style="padding: 50px; color: #999; text-align: center;">Завантаження...</div>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbx5wF2-YSFjB2NTOzObml4ZLtuKlZdyl72uISyRL9LyFh8dVZLJzy2MEQWS0OsW1OX9/exec';
        
        let allItems = [];
        let idx = 0;

        // ФУНКЦІЯ ДЛЯ ПЕРЕТВОРЕННЯ ТЕКСТУ В КРАСИВУ ДАТУ
        function formatDateUk(dateInput) {
            if (!dateInput || dateInput.toString().trim() === "" || dateInput.toString() === "-") return null;

            const months = ["січня", "лютого", "березня", "квітня", "травня", "червня", "липня", "серпня", "вересня", "жовтня", "листопада", "грудня"];
            
            let s = dateInput.toString().trim();
            // Якщо раптом затесався формат ISO (T), відрізаємо його
            if (s.includes('T')) s = s.split('T')[0];

            let parts = s.includes('.') ? s.split('.') : s.split('-');
            if (parts.length < 3) return dateInput;

            let day, monthIdx, year;

            if (parts[0].length === 4) { // Формат YYYY-MM-DD
                year = parts[0];
                monthIdx = parseInt(parts[1]) - 1;
                day = parseInt(parts[2]);
            } else { // Формат DD.MM.YYYY
                day = parseInt(parts[0]);
                monthIdx = parseInt(parts[1]) - 1;
                year = parts[2];
            }

            if (monthIdx < 0 || monthIdx > 11) return dateInput;
            return day + " " + months[monthIdx] + " " + year;
        }

        async function load() {
            try {
                const r = await fetch(scriptUrl);
                allItems = await r.json();
                render();
            } catch (e) { 
                document.getElementById('catalog').innerHTML = "<div style='color:red; padding:20px; text-align:center;'>Помилка зв'язку. Перевірте доступ.</div>"; 
            }
        }

       let selectedSuggestionIndex = -1; // Змінна для відстеження виділеного пункту

function handleSearch() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const suggestions = document.getElementById('searchSuggestions');
    
    if (term.length < 1) { 
        suggestions.style.display = 'none'; 
        selectedSuggestionIndex = -1;
        return; 
    }

    const matches = allItems.filter(item => 
        (item[3] && item[3].toString().toLowerCase().includes(term)) || 
        (item[4] && item[4].toString().toLowerCase().includes(term))
    );

    if (matches.length > 0) {
        suggestions.innerHTML = matches.map((item, i) => `
            <div class="suggestion-item ${i === 0 ? 'active' : ''}" 
                 id="sugg-${i}"
                 onclick="selectPerson('${item[3]}', '${item[4]}')">
                <strong>бр. ${item[4]}</strong> ${item[3]}
            </div>
        `).join('');
        suggestions.style.display = 'block';
        selectedSuggestionIndex = 0; // Завжди підсвічуємо перший елемент
    } else { 
        suggestions.style.display = 'none'; 
        selectedSuggestionIndex = -1;
    }
}

// Функція для вибору стрілками
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    const suggestions = document.querySelectorAll('.suggestion-item');
    if (suggestions.length === 0) return;

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        updateSelection(1, suggestions);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        updateSelection(-1, suggestions);
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (selectedSuggestionIndex >= 0) {
            suggestions[selectedSuggestionIndex].click();
        }
    }
});

function updateSelection(direction, list) {
    // Знімаємо клас active з поточного
    if (selectedSuggestionIndex >= 0) {
        list[selectedSuggestionIndex].classList.remove('active');
    }

    selectedSuggestionIndex += direction;

    // Зациклюємо список
    if (selectedSuggestionIndex >= list.length) selectedSuggestionIndex = 0;
    if (selectedSuggestionIndex < 0) selectedSuggestionIndex = list.length - 1;

    // Додаємо active новому та прокручуємо, якщо список довгий
    const activeItem = list[selectedSuggestionIndex];
    activeItem.classList.add('active');
    activeItem.scrollIntoView({ block: 'nearest' });
}

function selectPerson(surname, firstName) {
    document.getElementById('searchInput').value = "";
    document.getElementById('searchSuggestions').style.display = 'none';
    selectedSuggestionIndex = -1; // Скидаємо індекс
    
    const personIdx = allItems.findIndex(item => item[3] === surname && item[4] === firstName);
    if (personIdx !== -1) { 
        idx = personIdx; 
        render(); 
    }
}

        function createDetail(label, value) {
            const dateLabels = ["День народження", "Новіціат", "Перші обіти", "Вічні обіти", "Дияконат", "Священство"];
            let displayValue = value;
            if (dateLabels.includes(label)) displayValue = formatDateUk(value);
            if (!displayValue || displayValue === "—" || displayValue === "-" || displayValue.toString().trim() === "") return "";
            
            return `
                <div class="detail-row">
                    <div class="detail-label">${label}</div>
                    <div class="detail-value">${displayValue}</div>
                </div>`;
        }

     function render() {
    const catalog = document.getElementById('catalog');
    if (allItems.length === 0) return;
    const p = allItems[idx];

    // Розрахунок стажу (p[9] - Перші обіти, p[12] - Священство)
    const monkExp = calculateExperience(p[9]);
    const priestExp = calculateExperience(p[12]);

    catalog.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div class="photo-circle">
                    <img src="${p[0]}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/200?text=Немає+фото'">
                </div>
                <div class="name-box">
                    <h2 class="legal-name">бр. ${p[4] || '—'}</h2>
                    <div class="surname-main">${p[3] || '—'}</div>
                </div>
            </div>

            <div class="experience-box">
                ${monkExp ? `<div>${monkExp} Чернечого життя</div>` : ''}
                ${priestExp ? `<div>${priestExp} Священства</div>` : ''}
            </div>

            <div class="controls">
                <button onclick="change(-1)" ${idx === 0 ? 'disabled' : ''}>←</button>
                <span id="counter">${idx + 1} / ${allItems.length}</span>
                <button onclick="change(1)" ${idx === allItems.length - 1 ? 'disabled' : ''}>→</button>
            </div>
            
            <div class="details-grid">
                ${createDetail("Ім'я з Хрещення", p[5])}
                ${createDetail("День народження", p[6])}
                ${createDetail("Місце народження", p[7])}
                ${createDetail("Новіціат", p[8])}
                ${createDetail("Перші обіти", p[9])}
                ${createDetail("Вічні обіти", p[10])}
                ${createDetail("Дияконат", p[11])}
                ${createDetail("Священство", p[12])}
            </div>
        </div>`;
}

        function change(d) { idx += d; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                document.getElementById('searchSuggestions').style.display = 'none';
            }
        });
        
        load();
        function calculateExperience(dateStr) {
    if (!dateStr || dateStr === "-" || dateStr === "—") return null;
    
    // Перетворюємо рядок "ДД.ММ.РРРР" або "РРРР-ММ-ДД" у формат Дати
    let parts = dateStr.includes('.') ? dateStr.split('.') : dateStr.split('-');
    let dateObj;
    
    if (parts[0].length === 4) { // YYYY-MM-DD
        dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
    } else { // DD.MM.YYYY
        dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
    }

    if (isNaN(dateObj.getTime())) return null;

    let today = new Date();
    let years = today.getFullYear() - dateObj.getFullYear();
    let m = today.getMonth() - dateObj.getMonth();
    
    if (m < 0 || (m === 0 && today.getDate() < dateObj.getDate())) {
        years--;
    }

    if (years < 0) return null;

    // Відмінювання слова "рік"
    let suffix = "років";
    if (years % 10 === 1 && years % 100 !== 11) suffix = "рік";
    else if (years % 10 >= 2 && years % 10 <= 4 && (years % 100 < 10 || years % 100 >= 20)) suffix = "роки";

    return years + " " + suffix;
}
    </script>
</body>
</html>
